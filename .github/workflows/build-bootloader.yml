# Build rollback-enabled bootloader binaries for ESP32-C3 and ESP32.
#
# Triggers:
#   - Push changes to the bootloader build config
#   - Manual dispatch (workflow_dispatch)
#   - Release creation (adds binaries to release assets)
#
# Outputs:
#   - tools/bootloader/esp32c3/bootloader.bin
#   - tools/bootloader/esp32c3/partition-table.bin
#   - tools/bootloader/esp32/bootloader.bin
#   - tools/bootloader/esp32/partition-table.bin
#   - flash_bootloader.exe (Windows x86_64, standalone)
#   - flash_bootloader     (Linux x86_64, standalone)

name: Build Bootloader

on:
  push:
    paths:
      - 'tools/bootloader/sdkconfig.defaults.*'
      - 'tools/bootloader/CMakeLists.txt'
      - 'tools/bootloader/main/**'
      - 'tools/flash_bootloader/**'
      - 'partitions_balanced.csv'
      - '.github/workflows/build-bootloader.yml'
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - chip: esp32c3
            idf_target: esp32c3
          - chip: esp32
            idf_target: esp32

    container:
      image: espressif/idf:v5.1.4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare build directory
        run: |
          cd tools/bootloader

          # Copy the partition table into the build project
          cp ../../partitions_balanced.csv partitions_balanced.csv

          # Use chip-specific sdkconfig defaults
          cp sdkconfig.defaults.${{ matrix.chip }} sdkconfig.defaults

      - name: Build bootloader and partition table
        run: |
          cd tools/bootloader
          . $IDF_PATH/export.sh

          idf.py set-target ${{ matrix.idf_target }}
          idf.py bootloader
          idf.py partition-table

      - name: Collect binaries
        run: |
          CHIP=${{ matrix.chip }}
          OUT=tools/bootloader/${CHIP}
          mkdir -p ${OUT}

          cp tools/bootloader/build/bootloader/bootloader.bin          ${OUT}/bootloader.bin
          cp tools/bootloader/build/partition_table/partition-table.bin ${OUT}/partition-table.bin

          # Print sizes
          echo "=== ${CHIP} bootloader ==="
          ls -lh ${OUT}/bootloader.bin
          ls -lh ${OUT}/partition-table.bin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bootloader-${{ matrix.chip }}
          path: tools/bootloader/${{ matrix.chip }}/

  commit-binaries:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Download ESP32-C3 bootloader
        uses: actions/download-artifact@v4
        with:
          name: bootloader-esp32c3
          path: tools/bootloader/esp32c3/

      - name: Download ESP32 bootloader
        uses: actions/download-artifact@v4
        with:
          name: bootloader-esp32
          path: tools/bootloader/esp32/

      - name: Commit binaries
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add tools/bootloader/esp32c3/bootloader.bin \
                  tools/bootloader/esp32c3/partition-table.bin \
                  tools/bootloader/esp32/bootloader.bin \
                  tools/bootloader/esp32/partition-table.bin

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to bootloader binaries."
          else
            git commit -m "ci: update pre-built rollback-enabled bootloader binaries"
            git push
          fi

  build-flash-tool:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-gnu
            artifact: flash_bootloader.exe
            ext: .exe
            packages: gcc-mingw-w64-x86-64
          - target: x86_64-unknown-linux-gnu
            artifact: flash_bootloader
            ext: ""
            packages: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download bootloader binaries
        uses: actions/download-artifact@v4
        with:
          name: bootloader-esp32c3
          path: tools/bootloader/esp32c3/

      - name: Download ESP32 bootloader
        uses: actions/download-artifact@v4
        with:
          name: bootloader-esp32
          path: tools/bootloader/esp32/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation packages
        if: matrix.packages != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ${{ matrix.packages }}

      - name: Build flash tool
        working-directory: tools/flash_bootloader
        run: cargo build --release --target ${{ matrix.target }}

      - name: Collect binary
        run: |
          cp tools/flash_bootloader/target/${{ matrix.target }}/release/flash_bootloader${{ matrix.ext }} \
             ${{ matrix.artifact }}
          ls -lh ${{ matrix.artifact }}

      - name: Upload flash tool
        uses: actions/upload-artifact@v4
        with:
          name: flash-tool-${{ matrix.target }}
          path: ${{ matrix.artifact }}

  attach-to-release:
    needs: [build, build-flash-tool]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Download ESP32-C3 bootloader
        uses: actions/download-artifact@v4
        with:
          name: bootloader-esp32c3
          path: esp32c3/

      - name: Download ESP32 bootloader
        uses: actions/download-artifact@v4
        with:
          name: bootloader-esp32
          path: esp32/

      - name: Download Windows flash tool
        uses: actions/download-artifact@v4
        with:
          name: flash-tool-x86_64-pc-windows-gnu
          path: flash-tool/

      - name: Download Linux flash tool
        uses: actions/download-artifact@v4
        with:
          name: flash-tool-x86_64-unknown-linux-gnu
          path: flash-tool/

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            esp32c3/bootloader.bin
            esp32c3/partition-table.bin
            esp32/bootloader.bin
            esp32/partition-table.bin
            flash-tool/flash_bootloader.exe
            flash-tool/flash_bootloader
