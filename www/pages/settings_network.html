  <main class="main-content page" id="page-settings_network">
    <div class="page-head">
      <h1 class="page-title"><span data-icon="globe"></span> Network</h1>
      <div class="page-sub"><a href="#settings">Settings</a> / Network
      </div>
    </div>

    <!-- Status -->
    <div class="card">
      <div class="card-body">
        <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:.5rem">
          <span><strong>Status:</strong> <span id="net-status">–</span></span>
          <span style="display:flex;align-items:center;gap:6px;"><strong>Signal strength:</strong> <span
              id="net-rssi-icon"></span><span id="net-rssi">–</span></span>
        </div>
      </div>
    </div>

    <form data-submit="settingsSaveForm" data-save-url="/save_network" data-save-restart>
      <div id="net-msg"></div>
      <!-- WiFi Mode -->
      <div class="card">
        <div class="card-head"><span data-icon="wifi"></span> WiFi Mode</div>
        <div class="card-body">
          <div class="field">
            <select name="wifiMode" id="net-mode" class="input" data-change="netToggleMode">
              <option value="0">📶 AP Mode</option>
              <option value="1">🔗 Client Mode</option>
            </select>
          </div>
        </div>
      </div>

      <!-- AP Settings -->
      <div id="apSection">
        <div class="card">
          <div class="card-head">📶 AP Mode</div>
          <div class="card-body">
            <div class="field"><label class="field-label">SSID</label>
              <input type="text" name="apSSID" id="net-apSSID" placeholder="WaterLogger" class="input">
            </div>
            <div class="field"><label class="field-label">Password</label>
              <div style="display:flex;gap:8px">
                <input type="password" name="apPassword" id="net-apPass" class="input" style="flex:1">
                <button type="button" class="btn" data-click="togglePass" data-args='["net-apPass"]'><span data-icon="eye"></span></button>
              </div>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-head"><span data-icon="wrench"></span> AP Network Properties</div>
          <div class="card-body">
            <div class="form-grid">
              <div class="field"><label class="field-label">IP Address</label><input type="text" name="apIP"
                  id="net-apIP" class="input"></div>
              <div class="field"><label class="field-label">Gateway</label> <input type="text" name="apGateway"
                  id="net-apGW" class="input"></div>
              <div class="field"><label class="field-label">Subnet Mask</label><input type="text" name="apSubnet"
                  id="net-apSN" class="input"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Client Settings -->
      <div id="clientSection" style="display:none">
        <div class="card">
          <div class="card-head">🔗 Client Mode</div>
          <div class="card-body">
            <div class="field"><label class="field-label">SSID</label>
              <div style="display:flex;gap:8px">
                <input type="text" name="clientSSID" id="net-cSSID" class="input" style="flex:1">
                <button type="button" class="btn" data-click="netScanWifi"><span data-icon="search"></span></button>
              </div>
            </div>
            <div id="wifiList"
              style="display:none;margin-bottom:1rem;max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:8px">
            </div>
            <div class="field"><label class="field-label">Password</label>
              <div style="display:flex;gap:8px">
                <input type="password" name="clientPassword" id="net-cPass" class="input" style="flex:1">
                <button type="button" class="btn" data-click="togglePass" data-args='["net-cPass"]'><span data-icon="eye"></span></button>
                <button type="button" class="btn" data-click="netTestWifi" title="Verify credentials without saving">🧪 Test</button>
              </div>
              <div id="net-testResult" style="font-size:.85rem;margin-top:6px"></div>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-head"><span data-icon="wrench"></span> Client Network Properties</div>
          <div class="card-body">
            <div class="form-grid" id="staticFields">
              <!-- Hidden fields to store current connection details when form is un-checked -->
              <input type="hidden" id="net-ip2-current" value="">
              <input type="hidden" id="net-gw-current" value="">
              <input type="hidden" id="net-sn-current" value="">
              <input type="hidden" id="net-dns-current" value="">

              <div class="field"><label class="field-label">IP Address</label><input type="text" name="staticIP"
                  id="net-ip2" class="input" disabled></div>
              <div class="field"><label class="field-label">Gateway</label> <input type="text" name="gateway"
                  id="net-gw" class="input" disabled></div>
              <div class="field"><label class="field-label">Subnet Mask</label><input type="text" name="subnet"
                  id="net-sn" class="input" disabled></div>
              <div class="field"><label class="field-label">DNS Server</label> <input type="text" name="dns"
                  id="net-dns" class="input" disabled></div>
            </div>
            <div class="field mt-1">
              <label class="field-label">
                <input type="checkbox" name="useStaticIP" id="staticCheck" value="1" data-change="netToggleStatic"> Use
                Static IP
              </label>
            </div>
          </div>
        </div>
      </div>

      <button type="submit" class="btn primary btn-block"><span data-icon="save"></span> Save &amp; Restart</button>
    </form>
  </main>
