  <main class="main-content page" id="page-settings_hardware">
    <div class="page-header">
      <h1>🔧 Hardware</h1>
      <div class="breadcrumb"><a href='#settings' onclick="showSubpage('settings');return false">Settings</a> / Hardware
      </div>
    </div>

    <div class="alert alert-warning">⚠️ Changes require device restart to take effect.</div>

    <!-- Board diagram (if configured) — populated by hwInit() -->

      <div class="card-body text-center">
        <img id="boardDiagram" src="" style="max-width:100%;height:auto"
          onerror="this.parentElement.parentElement.style.display='none'">
      </div>
    </div>

    <!-- Form rendered from HW_SCHEMA via Form.bind() in hwInit() -->
    <div id="hw-host"></div>
  </main>
