  <main class="main-content page" id="page-update">
    <div class="page-header">
      <h1><span data-icon="cloud-upload"></span> Firmware Update</h1>
      <div class="breadcrumb"><a href="#settings">Settings</a> / Update
      </div>
    </div>

    <!-- Status popup -->
    <div id="popup" class="popup-overlay" style="display:none">
      <div class="popup-content">
        <div id="popupIcon" style="font-size:4rem;margin-bottom:1rem"></div>
        <div id="popupTitle" style="font-size:1.5rem;font-weight:bold;margin-bottom:.5rem"></div>
        <div id="popupMsg" style="margin-bottom:1rem"></div>
        <div id="popupProgress" style="display:none">
          <div style="background:#e0e0e0;border-radius:4px;height:12px;margin-bottom:.5rem;overflow:hidden">
            <div id="popupBar" style="width:0%;height:100%;background:#3498db;transition:width .3s"></div>
          </div>
          <div id="popupCounter"></div>
        </div>
        <button id="popupClose" class="btn btn-secondary" data-click="closePopup" style="display:none">Close</button>
      </div>
    </div>

    <!-- Current firmware -->
    <div class="card">
      <div class="card-header"><span data-icon="file-text"></span> Current Firmware</div>
      <div class="card-body">
        <div class="form-row">
          <div><strong>Version</strong>
            <div class="text-primary" id="ota-currentVer">–</div>
          </div>
          <div><strong>Device</strong>
            <div id="fwDevice">–</div>
          </div>
          <div><strong>Heap</strong>
            <div id="fwHeap">–</div>
          </div>
          <div><strong>Storage</strong>
            <div id="fwStorage">–</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Upload new firmware -->
    <div class="card">
      <div class="card-header"><span data-icon="cloud-upload"></span> Upload Firmware (.bin)</div>
      <div class="card-body">
        <div class="alert alert-warning"><span data-icon="alert-triangle"></span> Upload the correct .bin file. Wrong firmware will require USB recovery.
        </div>
        <form id="otaForm" data-submit="otaUpload">
          <div class="form-group">
            <input type="file" id="fwFile" name="update" accept=".bin" class="form-input" required
              data-change="otaFileSelected">
          </div>
          <div id="otaFileInfo" class="alert" style="display:none;margin-bottom:1rem;"></div>
          <button type="submit" id="otaUploadBtn" class="btn btn-danger btn-block" disabled><span data-icon="rocket"></span> Flash Firmware</button>
        </form>
        <div id="otaProgress" style="display:none;margin-top:1rem">
          <div style="background:#e0e0e0;border-radius:4px;height:24px;overflow:hidden">
            <div id="otaProgressBar" style="width:0%;height:100%;background:#27ae60;transition:width .3s"></div>
          </div>
          <p id="otaProgressText" class="text-center mt-1" style="font-weight:bold;">0%</p>
        </div>
      </div>
    </div>
  </main>
