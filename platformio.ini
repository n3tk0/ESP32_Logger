; PlatformIO Project Configuration
; Water Logger v5.0 — Multi-Sensor Environmental Platform
; Target: Seeed XIAO ESP32-C3 (primary) or ESP32-S3 (8MB)

[platformio]
default_envs = xiao_esp32c3

; ── Shared settings ─────────────────────────────────────────────────────────
[env]
framework = arduino
platform  = espressif32

; Logger.ino (the Arduino sketch entry point with setup/loop) lives in the
; project root for Arduino IDE compatibility.  This pre-build script copies
; it into src/ so PlatformIO's default Arduino discovery finds it.  The
; copied src/Logger.ino is gitignored.
extra_scripts = pre:scripts/copy_sketch.py

; Add the project root to the include path so that the copied src/Logger.ino
; can resolve its "src/..." includes (e.g. "src/setup.h", "src/core/Globals.h")
; the same way Arduino IDE does when Logger.ino lives in the project root.
build_flags = -I.

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    esphome/ESPAsyncWebServer-esphome @ ^3.1.0
    me-no-dev/AsyncTCP @ ^1.1.1
    ; All other sensors/MQTT/RTC use internal mini drivers (no external libs)

monitor_speed = 115200

; ─────────────────────────────────────────────────────────────────────────────
; XIAO ESP32-C3 (RISC-V, single core, 4MB flash — production target)
; ─────────────────────────────────────────────────────────────────────────────
[env:xiao_esp32c3]
board     = seeed_xiao_esp32c3

board_build.filesystem = littlefs
board_build.partitions = partitions_balanced.csv

; All sensor/exporter toggles and tunables are defined in src/setup.h.
; Only board-specific pin overrides and chip-specific flags live here.
build_flags =
    ${env.build_flags}
    -DCONFIG_FREERTOS_UNICORE=1
    ; Pin overrides for XIAO ESP32-C3 wiring
    -DDEFAULT_SDA=6
    -DDEFAULT_SCL=7
    -DDEFAULT_FLOW_PIN=21

upload_speed    = 921600
monitor_filters = esp32_exception_decoder

; ─────────────────────────────────────────────────────────────────────────────
; ESP32-C3 Super Mini (generic ESP32-C3 board with native USB JTAG/Serial)
; ─────────────────────────────────────────────────────────────────────────────
[env:esp32c3_supermini]
board     = esp32-c3-devkitm-1

board_build.filesystem = littlefs
board_build.partitions = partitions_balanced.csv

build_flags =
    ${env.build_flags}
    -DCONFIG_FREERTOS_UNICORE=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DDEFAULT_SDA=8
    -DDEFAULT_SCL=9
    -DDEFAULT_FLOW_PIN=21

upload_speed    = 921600
monitor_filters = esp32_exception_decoder

; ─────────────────────────────────────────────────────────────────────────────
; ESP32-S3 (dual-core Xtensa, 8MB flash)
; ─────────────────────────────────────────────────────────────────────────────
[env:esp32s3]
board     = esp32-s3-devkitc-1

board_build.filesystem = littlefs
board_build.partitions = default_8MB.csv
board_upload.flash_size = 8MB

; All sensor/exporter toggles and tunables are defined in src/setup.h.
; Only board-specific pin overrides live here (S3 is dual-core, so no
; CONFIG_FREERTOS_UNICORE).
build_flags =
    ${env.build_flags}
    ; Pin overrides for ESP32-S3 DevKitC wiring
    -DDEFAULT_SDA=8
    -DDEFAULT_SCL=9
    -DDEFAULT_FLOW_PIN=4

upload_speed = 921600
