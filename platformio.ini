; PlatformIO Project Configuration
; Water Logger v5.0 — Multi-Sensor Environmental Platform
; Target: Seeed XIAO ESP32-C3 (primary) or ESP32-S3 (8MB)

[platformio]
default_envs = xiao_esp32c3
; Logger.ino (the Arduino sketch entry point with setup/loop) lives in the
; project root for Arduino IDE compatibility.  Point src_dir at the root so
; PlatformIO can discover it, then restrict the filter to src/ + Logger.ino.
src_dir = .

; ── Shared settings ─────────────────────────────────────────────────────────
[env]
framework = arduino
platform  = espressif32

build_src_filter = -<*> +<src/> +<Logger.ino>

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    esphome/ESPAsyncWebServer-esphome @ ^3.1.0
    me-no-dev/AsyncTCP @ ^1.1.1
    ; All other sensors/MQTT/RTC use internal mini drivers (no external libs)

monitor_speed = 115200

; ─────────────────────────────────────────────────────────────────────────────
; XIAO ESP32-C3 (RISC-V, single core, 4MB flash — production target)
; ─────────────────────────────────────────────────────────────────────────────
[env:xiao_esp32c3]
board     = seeed_xiao_esp32c3

board_build.filesystem = littlefs
board_build.partitions = partitions_balanced.csv

build_flags =
    -DCONFIG_FREERTOS_UNICORE=1
    -DCORE_DEBUG_LEVEL=0
    -DDEBUG_MODE=0
    ; Pin definitions for XIAO ESP32-C3
    -DDEFAULT_SDA=6
    -DDEFAULT_SCL=7
    -DDEFAULT_FLOW_PIN=21
    ; Sensor/exporter module toggles (comment out to exclude from build)
    -DSENSOR_BME280_ENABLED
    -DSENSOR_BME688_ENABLED
    -DSENSOR_DS18B20_ENABLED
    -DSENSOR_SDS011_ENABLED
    -DSENSOR_PMS5003_ENABLED
    -DSENSOR_ENS160_ENABLED
    -DSENSOR_SGP30_ENABLED
    -DSENSOR_SCD4X_ENABLED
    -DSENSOR_VEML6075_ENABLED
    -DSENSOR_VEML7700_ENABLED
    -DSENSOR_BH1750_ENABLED
    -DSENSOR_WATERFLOW_ENABLED
    -DSENSOR_RAIN_ENABLED
    -DSENSOR_WIND_ENABLED
    -DSENSOR_SOIL_ENABLED
    -DSENSOR_HCSR04_ENABLED
    -DEXPORT_MQTT_ENABLED
    -DEXPORT_HTTP_ENABLED
    -DEXPORT_SENSORCOMMUNITY_ENABLED
    -DEXPORT_OPENSENSEMAP_ENABLED

upload_speed    = 921600
monitor_filters = esp32_exception_decoder

; ─────────────────────────────────────────────────────────────────────────────
; ESP32-S3 (dual-core Xtensa, 8MB flash)
; ─────────────────────────────────────────────────────────────────────────────
[env:esp32s3]
board     = esp32-s3-devkitc-1

board_build.filesystem = littlefs
board_build.partitions = default_8MB.csv
board_upload.flash_size = 8MB

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DDEBUG_MODE=0
    ; Pin definitions for ESP32-S3 DevKitC (adjust to your board)
    -DDEFAULT_SDA=8
    -DDEFAULT_SCL=9
    -DDEFAULT_FLOW_PIN=4
    ; All sensors/exporters enabled (8MB has room)
    -DSENSOR_BME280_ENABLED
    -DSENSOR_BME688_ENABLED
    -DSENSOR_DS18B20_ENABLED
    -DSENSOR_SDS011_ENABLED
    -DSENSOR_PMS5003_ENABLED
    -DSENSOR_ENS160_ENABLED
    -DSENSOR_SGP30_ENABLED
    -DSENSOR_SCD4X_ENABLED
    -DSENSOR_VEML6075_ENABLED
    -DSENSOR_VEML7700_ENABLED
    -DSENSOR_BH1750_ENABLED
    -DSENSOR_WATERFLOW_ENABLED
    -DSENSOR_RAIN_ENABLED
    -DSENSOR_WIND_ENABLED
    -DSENSOR_SOIL_ENABLED
    -DSENSOR_HCSR04_ENABLED
    -DEXPORT_MQTT_ENABLED
    -DEXPORT_HTTP_ENABLED
    -DEXPORT_SENSORCOMMUNITY_ENABLED
    -DEXPORT_OPENSENSEMAP_ENABLED

upload_speed = 921600
