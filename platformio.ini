; PlatformIO Project Configuration
; Water Logger v5.0 — Multi-Sensor Environmental Platform
; Target: Seeed XIAO ESP32-C3 (primary) or generic ESP32

[platformio]
default_envs = xiao_esp32c3

; ─────────────────────────────────────────────────────────────────────────────
; XIAO ESP32-C3 (RISC-V, single core, production target)
; ─────────────────────────────────────────────────────────────────────────────
[env:xiao_esp32c3]
platform  = espressif32
board     = seeed_xiao_esp32c3
framework = arduino

board_build.filesystem = littlefs
board_build.partitions = min_spiffs.csv

build_flags =
    -DCONFIG_FREERTOS_UNICORE=1
    -DCORE_DEBUG_LEVEL=0
    -DDEBUG_MODE=0
    ; Pin definitions for XIAO ESP32-C3
    -DDEFAULT_SDA=6
    -DDEFAULT_SCL=7
    -DDEFAULT_FLOW_PIN=21

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    esphome/ESPAsyncWebServer-esphome @ ^3.1.0
    me-no-dev/AsyncTCP @ ^1.1.1
    knolleary/PubSubClient @ ^2.8.0
    adafruit/Adafruit BME280 Library @ ^2.2.4
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    makuna/RTC @ ^2.4.2

monitor_speed   = 115200
upload_speed    = 921600
monitor_filters = esp32_exception_decoder

; ─────────────────────────────────────────────────────────────────────────────
; Generic ESP32 (dual-core, optional)
; ─────────────────────────────────────────────────────────────────────────────
[env:esp32]
platform  = espressif32
board     = esp32dev
framework = arduino

board_build.filesystem = littlefs
board_build.partitions = default_8MB.csv

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DDEBUG_MODE=0

lib_deps = ${env:xiao_esp32c3.lib_deps}

monitor_speed = 115200
